services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academico-filament-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - academico-network
      - sail
    environment:
      - SERVER_NAME=:80
      - DB_HOST=mysql
      - DB_PORT=3306

networks:
  academico-network:
    driver: bridge
  sail:
    external: true
    name: academico_sail
