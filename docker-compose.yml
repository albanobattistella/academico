services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academico-filament-app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - academico-network
    environment:
      - SERVER_NAME=:80
      - DB_CONNECTION=mariadb
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=academico_filament
      - DB_USERNAME=academico
      - DB_PASSWORD=secret
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    container_name: academico-filament-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: academico_filament
      MARIADB_USER: academico
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - academico-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  academico-network:
    driver: bridge

volumes:
  mariadb-data:
    driver: local
